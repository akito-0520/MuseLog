services:
  backend:
    image: ghcr.io/akito-0520/muselog:latest
    container_name: muselog-backend
    expose:
      - "8080"
    restart: always

  nginx:
    image: nginx:latest
    container_name: muselog-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    restart: always
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: muselog-frontend
    ports:
      - "3000:3000"
    restart: always
    profiles:
      - development
