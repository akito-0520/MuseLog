services:
  backend:
    image: ghcr.io/akito-0520/muselog:latest
    container_name: muselog-backend
    expose:
      - "8080"
    restart: always

  nginx:
    image: nginx:latest
    container_name: muselog-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    restart: always
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - nginx
    restart: unless-stopped
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
    # Certbot renewal loop: attempts renewal every 12 hours, or obtains new certificate if none exists
    command: >-
      sh -c "while :; do certbot renew --webroot -w /var/www/certbot --quiet ||
      certbot certonly --webroot -w /var/www/certbot --email $${CERTBOT_EMAIL}
      --agree-tos --no-eff-email -d api.muselog.jp --non-interactive; sleep 12h;
      done"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: muselog-frontend
    ports:
      - "3000:3000"
    restart: always
    profiles:
      - development
