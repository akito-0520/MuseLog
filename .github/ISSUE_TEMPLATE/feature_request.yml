# feature_request.yml
name: 機能リクエスト
description: 新機能の提案はこちら
title: 'Feature: '
body:
  - type: textarea
    id: overview
    attributes:
      label: 概要
      description: |
        追加したい機能の概要を記載してください。
        イメージ画像やモックアップがあれば添付してください。
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景・課題
      description: |
        この機能が必要な理由や、解決したい課題を記載してください。
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: |
        どのような機能・実装を希望するか記載してください。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: |
        検討した他の解決策があれば記載してください。
    validations:
      required: false
  - type: textarea
    id: supplement
    attributes:
      label: 補足
      description: |
        その他、参考になる情報があれば記載してください。
    validations:
      required: false
