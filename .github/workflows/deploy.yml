name: CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "!backend/README.md"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      DEPLOY_FILES: "backend/docker-compose.yml,backend/nginx"
      TARGET_DIR: "~/muselog"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # リポジトリ名を小文字に変換（Dockerタグ用）
      - name: Lowercase Repo Name
        run: echo "REPO_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # ブランチ名を環境変数に設定
      - name: Set Branch Name and Docker Tag
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV

          # Dockerタグ用にブランチ名をサニタイズ
          # 1. 小文字化
          SANITIZED_BRANCH=$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]')
          # 2. Dockerタグで許可されていない文字を '-' に置換し、前後の '-' を削除
          #    (小文字化後なので、[a-z0-9_.-] のみを許可)
          SANITIZED_BRANCH=$(echo "${SANITIZED_BRANCH}" | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')
          # 3. すべて削除されて空になった場合のフォールバック
          if [ -z "${SANITIZED_BRANCH}" ]; then
            SANITIZED_BRANCH="branch"
          fi
          # 4. 短いコミットSHAを付与して一意性を担保しつつ、Dockerタグ長を満たすように調整
          #    Dockerタグの最大長は128文字
          MAX_TAG_LENGTH=128
          SHORT_SHA="${GITHUB_SHA::7}"
          RESERVED_LENGTH=$(( ${#SHORT_SHA} + 1 )) # '-' + SHORT_SHA
          BASE_MAX_LENGTH=$(( MAX_TAG_LENGTH - RESERVED_LENGTH ))
          if [ ${#SANITIZED_BRANCH} -gt ${BASE_MAX_LENGTH} ]; then
            SANITIZED_BRANCH="${SANITIZED_BRANCH:0:${BASE_MAX_LENGTH}}"
          fi
          DOCKER_TAG="${SANITIZED_BRANCH}-${SHORT_SHA}"
          echo "DOCKER_TAG=${DOCKER_TAG}" >> $GITHUB_ENV

      # 1. GHCRへログイン
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. ビルド & プッシュ (ブランチ固有タグ)
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.REPO_NAME }}:${{ env.DOCKER_TAG }}

      # 2-2. mainブランチの場合は latest タグも更新
      - name: Build and Push latest (main only)
        if: ${{ env.BRANCH_NAME == 'main' }}
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.REPO_NAME }}:latest

      # 3. サーバー上のディレクトリを準備
      - name: Prepare Server Directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/muselog ~/muselog/nginx ~/muselog/certbot
            sudo chown -R ubuntu:ubuntu ~/muselog/nginx ~/muselog/docker-compose.yml ~/muselog/certbot 2>/dev/null || true
            chmod -R 755 ~/muselog/nginx ~/muselog/certbot 2>/dev/null || true

      # 4. docker-compose.yml をサーバーへ転送
      - name: Copy docker-compose.yml to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ${{ env.DEPLOY_FILES }}
          target: ${{ env.TARGET_DIR }}
          strip_components: 1

      # 5. SSHデプロイ
      - name: Deploy to Ubuntu
        uses: appleboy/ssh-action@v1.2.0
        env:
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: CERTBOT_EMAIL
          script: |
            # ディレクトリへ移動
            cd ~/muselog

            # GHCRへログイン (一時トークンによる認証)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 環境変数を.envファイルに書き込み
            echo "CERTBOT_EMAIL=${CERTBOT_EMAIL}" > .env

            # イメージを取得してコンテナ再起動
            docker compose pull
            docker compose up -d --remove-orphans

            # ログアウト（セキュリティのため）
            docker logout ghcr.io
