name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (leave empty to use current branch)'
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "!backend/README.md"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      # リポジトリ名を小文字に変換（Dockerタグ用）
      - name: Lowercase Repo Name
        run: echo "REPO_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # ブランチ名を環境変数に設定
      - name: Set Branch Name
        run: |
          if [ -n "${{ github.event.inputs.branch }}" ]; then
            BRANCH_NAME="${{ github.event.inputs.branch }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV
          # Dockerタグ用にブランチ名をサニタイズ (/ を - に置換)
          SANITIZED_BRANCH=$(echo "${BRANCH_NAME}" | sed 's/\//-/g')
          echo "DOCKER_TAG=${SANITIZED_BRANCH}" >> $GITHUB_ENV

      # 1. GHCRへログイン
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. ビルド & プッシュ
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.REPO_NAME }}:${{ env.DOCKER_TAG }}

      # 3. SSHデプロイ
      - name: Deploy to Ubuntu
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # サーバー上のディレクトリへ移動
            cd ~/${{ github.event.repository.name }}

            # コードを最新化
            git pull origin ${{ github.event.inputs.branch || github.ref_name }}

            # ディレクトリの移動
            cd backend

            # GHCRへログイン (pull用)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # コンテナ再起動
            docker compose pull
            docker compose up -d --remove-orphans
